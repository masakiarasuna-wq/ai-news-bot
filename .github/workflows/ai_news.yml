name: AI News Bot

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日22:00 UTC = 翌7:00 JST（ニュース）
    - cron: '0 11 * * *'   # 毎日11:00 UTC = 20:00 JST（基礎知識）
  workflow_dispatch:

jobs:
  # ===== 朝7時 ニュース =====
  ai-news:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run AI news bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ai_news_report.py

  marketing:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run marketing bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MARKETING_CHANNEL_ID: ${{ secrets.MARKETING_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marketing_bot.py

  marketing-research:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run marketing research bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MARKETING_RESEARCH_CHANNEL_ID: ${{ secrets.MARKETING_RESEARCH_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marketing_research_bot.py

  # ===== 夜8時 基礎知識 =====
  ai-knowledge:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run AI knowledge bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python ai_knowledge_bot.py

  marketing-knowledge:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run marketing knowledge bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MARKETING_CHANNEL_ID: ${{ secrets.MARKETING_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marketing_knowledge_bot.py

  marketing-research-knowledge:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 11 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run marketing research knowledge bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MARKETING_RESEARCH_CHANNEL_ID: ${{ secrets.MARKETING_RESEARCH_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python marketing_research_knowledge_bot.py
